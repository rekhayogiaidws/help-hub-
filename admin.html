<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel - Feedback</title>

<style>
body{
font-family:Segoe UI,sans-serif;
background:#f4f7fc;
margin:0;
padding:20px;
}

header{
background:#004080;
color:white;
padding:15px;
text-align:center;
border-radius:10px;
}

h2{
margin:0;
}

#count{
text-align:center;
font-size:20px;
margin:20px;
font-weight:bold;
color:#004080;
}

.feedback-card{
background:white;
padding:15px;
margin:15px 0;
border-radius:10px;
box-shadow:0 3px 8px rgba(0,0,0,0.15);
}

.feedback-card h3{
margin:0;
color:#004080;
}

.feedback-card p{
margin:8px 0;
}

button{
background:red;
color:white;
border:none;
padding:8px 15px;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:darkred;
}

.back-btn{
display:inline-block;
margin-top:20px;
padding:10px 20px;
background:#004080;
color:white;
text-decoration:none;
border-radius:8px;
}
.dashboard{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:15px;
margin-bottom:20px;
}

.card{
background:white;
padding:20px;
border-radius:10px;
text-align:center;
box-shadow:0 2px 8px rgba(0,0,0,.15);
}

.card h3{
margin-bottom:10px;
}

.card p{
font-size:28px;
font-weight:bold;
color:#007bff;
}
#search{
width:100%;
padding:12px;
margin:15px 0;
font-size:16px;
border:1px solid #ccc;
border-radius:8px;
box-sizing:border-box;
}
</style>

</head>
<body>

<header>
<h2>📋 Feedback Admin Panel</h2>
</header>

<div id="count"></div>
<input
  type="text"
  id="search"
  placeholder="🔍 Search by name or email..."
>
<div class="dashboard">

  <div class="card">
    <h3>Total Feedback</h3>
    <p id="totalFeedback">0</p>
  </div>

  <div class="card">
    <h3>Today's Feedback</h3>
    <p id="todayFeedback">0</p>
  </div>

  <div class="card">
    <h3>Deleted</h3>
    <p id="deletedCount">0</p>
  </div>

</div>
<div id="feedbackList"></div>
<button onclick="logout()">Logout</button>
<a href="index.html" class="back-btn">⬅ Back to Home</a>

<script type="module" src="admin.js"></script>
</body>
</html>
